linters:
  enable:
    - revive

linters-settings:
  revive:
    rules:
      - name: exported
        arguments:
          - checkPrivateReceivers
          - disableStutteringCheck

issues:
  exclude-use-default: false
  exclude-rules:
    - path: _test\.go
      linters:
        - revive
    - path: cmd/cmd_test/
      linters:
        - revive
    - path: vendor/
      linters:
        - revive
    - path: internal/
      linters:
        - revive
