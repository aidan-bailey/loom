name: Race Detector

on:
  push:
    branches: [ main ]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/race.yml'
  pull_request:
    branches: [ main ]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/race.yml'

jobs:
  race:
    name: go test -race
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      # The race detector requires cgo, which requires a C toolchain.
      # ubuntu-latest has gcc preinstalled, so no apt step needed.
      - name: Run tests with race detector
        env:
          CGO_ENABLED: '1'
        run: go test -race -count=1 ./...
